  <title>给你做顿饭</title>

  <!-- 浏览器图标 -->
  <link rel="icon" href="/icon-192.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- iPhone 图标 -->

  <!-- 主题颜色 -->
  <meta name="theme-color" content="#FFD54F" />

  <!-- iPhone 全屏 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />

<body>
  <div id="root"></div>
  <script>window.onerror=function(m,u,l,c,e){var d=document.createElement('div');d.style.cssText='position:fixed;top:0;left:0;right:0;padding:20px;background:#fee;border-bottom:3px solid red;color:#c00;font-size:14px;font-family:monospace;z-index:99999';d.textContent='ERROR: '+(e?e.message||e.toString():m);document.body.prepend(d)};window.addEventListener('unhandledrejection',function(e){var d=document.createElement('div');d.style.cssText='position:fixed;top:60px;left:0;right:0;padding:20px;background:#fff0e0;border-bottom:3px solid orange;color:#c00;font-size:14px;font-family:monospace;z-index:99999';d.textContent='PROMISE: '+(e.reason?e.reason.message||e.reason.toString():'?');document.body.prepend(d)});</script>
 <script type="module" src="/src/main.jsx"></script>
</body>
