services:
  - type: web
    name: cook-for-u-backend
    runtime: node
    repo: https://github.com/gongjinzhen/cook-for-3.git
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: cook-for-u-db
          property: connectionString

databases:
  - type: postgres
    name: cook-for-u-db
    databaseName: cook_for_u
    user: cook_for_u_user
